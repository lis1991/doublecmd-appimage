name: 🧰 Build Double Commander AppImage with AppImageBuilder

on:
  schedule:
    - cron: '0 4 * * 0'  # Каждое воскресенье в 04:00 UTC
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-24.04-arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl desktop-file-utils libglib2.0-0

      # --- Добавляем кэширование ---
      - name: 💾 Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-${{ matrix.arch }}-pip-${{ hashFiles('**/AppImageBuilder.yml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-pip-

      - name: 💾 Cache appimagetool
        id: cache-appimagetool
        uses: actions/cache@v3
        with:
          path: ~/appimagetool.AppImage
          key: appimagetool-${{ matrix.arch }}

      - name: 💾 Cache AppImage runtime
        id: cache-runtime
        uses: actions/cache@v3
        with:
          path: ~/AppImageKit-runtime-${{ matrix.arch }}
          key: AppImageKit-runtime-${{ matrix.arch }}
      # -----------------------------

      - name: 📦 Установить AppImageBuilder
        run: |
          sudo apt install -y python3-pip
          pip3 install appimage-builder

      # --- Установка кэшированного appimagetool, если он есть ---
      - name: 🔧 Установить кэшированный appimagetool (если есть)
        if: steps.cache-appimagetool.outputs.cache-hit == 'true'
        run: |
          chmod +x ~/appimagetool.AppImage
          sudo mv ~/appimagetool.AppImage /usr/local/bin/appimagetool
      # ----------------------------------------------------------

      # --- Установка кэшированного runtime, если он есть ---
      - name: 🔧 Подготовить кэшированный runtime (если есть)
        if: steps.cache-runtime.outputs.cache-hit == 'true'
        run: |
          mkdir -p ~/.cache/appimage-builder
          cp ~/AppImageKit-runtime-${{ matrix.arch }} ~/.cache/appimage-builder/runtime-${{ matrix.arch }}
      # ----------------------------------------------------

      - name: 🔨 Build Double Commander AppImage
        run: |
          appimage-builder --recipe AppImageBuilder.yml --skip-test

      # --- Сохраняем appimagetool в кэш, если он был скачан ---
      - name: 💾 Сохранить appimagetool в кэш (если не было кэша)
        if: steps.cache-appimagetool.outputs.cache-hit != 'true'
        run: |
          if [ ! -f ~/appimagetool.AppImage ]; then
            echo "appimagetool не найден в стандартных местах, скачиваем для кэширования..."
            wget -O ~/appimagetool.AppImage "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-${{ matrix.arch }}.AppImage"
            chmod +x ~/appimagetool.AppImage
          fi
          echo "appimagetool готов для кэширования в ~/appimagetool.AppImage"
      # ----------------------------------------------------------

      # --- Сохраняем runtime в кэш, если он был скачан ---
      - name: 💾 Сохранить runtime в кэш (если не было кэша)
        if: steps.cache-runtime.outputs.cache-hit != 'true'
        run: |
          if [ -f ~/.cache/appimage-builder/runtime-${{ matrix.arch }} ]; then
             cp ~/.cache/appimage-builder/runtime-${{ matrix.arch }} ~/AppImageKit-runtime-${{ matrix.arch }}
             echo "runtime найден и скопирован для кэширования."
          else
             echo "runtime не найден в ~/.cache/appimage-builder/ для кэширования."
          fi
      # ---------------------------------------------------

      # --- Отладка: Проверяем, что файлы созданы ---
      - name: 🐞 Debug - List files after build
        run: |
          echo "🔍 Содержимое текущей директории после сборки:"
          ls -la
          echo "🔍 Поиск файлов .AppImage:"
          find . -name "*.AppImage" -type f 2>/dev/null || echo "  Файлы .AppImage не найдены"
          echo "🔍 Содержимое ~/.cache/appimage-builder (если есть):"
          ls -la ~/.cache/appimage-builder/ 2>/dev/null || echo "  Директория ~/.cache/appimage-builder не найдена"
      # ------------------------------------------

      - name: 📤 Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DoubleCommander-AppImage-${{ matrix.arch }}
          path: |
            *.AppImage
            *doublecmd*.AppImage
            DoubleCommander*.AppImage

      - name: 🏷️ Extract Version (Optional)
        id: get_version
        run: |
          FILE=$(find . -name "*doublecmd*.AppImage" -type f 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then
            FILE=$(find . -name "DoubleCommander*.AppImage" -type f 2>/dev/null | head -1)
          fi
          if [ -z "$FILE" ]; then
             echo "❌ AppImage файл не найден после сборки!"
             echo "🔍 Доступные файлы в директории:"
             ls -la
             echo "::error::AppImage файл не найден"
             exit 1
          fi

          echo "✅ Найден AppImage файл: $FILE"
          echo "appimage_file=$FILE" >> $GITHUB_OUTPUT

          VERSION=$(date +"%Y%m%d%H%M%S")
          echo "🔖 Установлена версия (дата/время): $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 🚀 Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.get_version.outputs.appimage_file }}
          tag_name: v${{ steps.get_version.outputs.version }}-${{ matrix.arch }}
          body: "Автоматическая сборка Double Commander AppImage через AppImageBuilder (${{ matrix.arch }})"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
